<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description | default: page.title }}">
    <title>{{ page.title }} | Shuangben Chen</title>
    <link rel="icon" href="/assets/brand/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/assets/site.css">
</head>
<body>
    <header class="topbar">
        <nav class="site-shell nav" aria-label="Primary navigation">
            <a class="brand" href="/"><img class="brand-mark" src="/assets/brand/favicon.svg" alt=""><span>Shuangben</span> <span class="brand-surname">Chen</span></a>
            <button class="menu-toggle" id="menu-toggle" type="button" aria-expanded="false" aria-label="Menu"><span class="menu-toggle-lines" aria-hidden="true"><span></span><span></span></span><span>Menu</span></button>
            <div class="nav-links">
                <a href="/" data-i18n="nav.about">About</a>
                <a href="/academics/" data-i18n="nav.academics">Academics</a>
                <div class="nav-item"><a href="/projects/" data-i18n="nav.projects">Projects</a><div class="nav-submenu"><a href="/projects/research/" data-i18n="projects.research.nav">Research</a><a href="/projects/design/" data-i18n="projects.design.nav">Design</a></div></div>
                <a href="/blog/" data-i18n="nav.blog">Blog</a>
                <a href="/contact/" data-i18n="nav.contact">Contact</a>
                <a href="/others/" data-i18n="nav.others">Others</a>
            </div>
            <div class="nav-tools">
                <div class="search"><input id="site-search" type="search" autocomplete="off" data-i18n-placeholder="search.placeholder" placeholder="Search"><div id="search-results" class="search-results" aria-live="polite"></div></div>
                <button class="tool-button" id="language-toggle" type="button">中文</button>
                <button class="theme-cycle" id="theme-toggle" type="button"></button>
            </div>
        </nav>
    </header>
    <main class="site-shell">
        <article class="page-head">
            <p class="eyebrow">{{ page.date | date: "%b %-d, %Y" }}</p>
            <h1 class="page-title">{{ page.title }}</h1>
            {% if page.description %}<p>{{ page.description }}</p>{% endif %}
        </article>
        <section class="section">
            <div class="section-label"><h2>Note</h2><p>Blog post</p></div>
            <article class="card">{{ content }}</article>
        </section>
    </main>
    <footer class="footer"><div class="site-shell"><span>© 2026 Shuangben Chen</span><span data-last-modified>Last updated</span></div></footer>
    <script src="/assets/site.js"></script>
</body>
</html>
